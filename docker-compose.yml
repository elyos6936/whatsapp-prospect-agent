services:
  klanvio-api:
    build: .
    container_name: klanvio-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    labels:
      - traefik.enable=true
      - traefik.http.routers.klanvio-api.rule=Host(`api.klanvio.com`) || Host(`klanvio-api.srv1820011.hstgr.cloud`)
      - traefik.http.routers.klanvio-api.entrypoints=websecure
      - traefik.http.routers.klanvio-api.tls.certresolver=letsencrypt
      - traefik.http.services.klanvio-api.loadbalancer.server.port=3001
      # Timeouts longs (agent / Evolution) — évite coupure → « Failed to fetch »
      - traefik.http.services.klanvio-api.loadbalancer.responseForwarding.flushInterval=1ms
    environment:
      PORT: "3001"
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      SUPABASE_URL: ${SUPABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      LLM_PROVIDER: ${LLM_PROVIDER:-deepseek}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-deepseek-v4-pro}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-deepseek-v4-pro}
      EVOLUTION_API_BASE_URL: ${EVOLUTION_API_BASE_URL}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_INTEGRATIONS_CLIENT_ID: ${GOOGLE_INTEGRATIONS_CLIENT_ID:-}
      GOOGLE_INTEGRATIONS_CLIENT_SECRET: ${GOOGLE_INTEGRATIONS_CLIENT_SECRET:-}
      GOOGLE_INTEGRATIONS_REDIRECT_URI: ${GOOGLE_INTEGRATIONS_REDIRECT_URI:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://www.klanvio.com,https://klanvio.com,https://klanvio.vercel.app}
      PUBLIC_URL: ${PUBLIC_URL:-https://api.klanvio.com}
      APP_URL: ${APP_URL:-https://www.klanvio.com,https://klanvio.vercel.app}
      TYPEFORM_CLIENT_ID: ${TYPEFORM_CLIENT_ID:-}
      TYPEFORM_CLIENT_SECRET: ${TYPEFORM_CLIENT_SECRET:-}
      TYPEFORM_REDIRECT_URI: ${TYPEFORM_REDIRECT_URI:-}
      TOKENS_ENCRYPTION_KEY: ${TOKENS_ENCRYPTION_KEY:-}
