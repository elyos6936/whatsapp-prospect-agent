services:
  klanvio-api:
    build: .
    container_name: klanvio-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    labels:
      - traefik.enable=true
      - traefik.http.routers.klanvio-api.rule=Host(`klanvio-api.srv1820011.hstgr.cloud`)
      - traefik.http.routers.klanvio-api.entrypoints=websecure
      - traefik.http.routers.klanvio-api.tls.certresolver=letsencrypt
      - traefik.http.services.klanvio-api.loadbalancer.server.port=3001
    environment:
      PORT: "3001"
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      SUPABASE_URL: ${SUPABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      LLM_PROVIDER: ${LLM_PROVIDER:-deepseek}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-deepseek-v4-pro}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-deepseek-v4-pro}
      EVOLUTION_API_BASE_URL: ${EVOLUTION_API_BASE_URL}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://klanvio.netlify.app,https://klanvio1.netlify.app}
      PUBLIC_URL: ${PUBLIC_URL:-https://klanvio-api.srv1820011.hstgr.cloud}
