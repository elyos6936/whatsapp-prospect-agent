[build]
  base = "web"
  # publish est relatif à base → "dist" = web/dist, pas web/web/dist
  publish = "dist"
  command = "npm install --legacy-peer-deps && npm run build"

[build.environment]
  NODE_VERSION = "20"
  NODE_OPTIONS = "--max-old-space-size=4096"
  NPM_FLAGS = "--legacy-peer-deps"
  # Faux positif Excalidraw (motif AIza… dans node_modules, pas notre secret)
  SECRETS_SCAN_SMART_DETECTION_OMIT_VALUES = "AIza"
  SECRETS_SCAN_OMIT_PATHS = "node_modules/@excalidraw"
  VITE_API_URL = "https://klanvio-api.srv1820011.hstgr.cloud"
  VITE_GOOGLE_CLIENT_ID = "505015578658-o30f55iuphed69go2klr2lnn1n3esj31.apps.googleusercontent.com"
  VITE_GOOGLE_PICKER_API_KEY = "AIzaSyAobBqMFKaX0lYRE6f_qcLoWUoB8ts6gx8"
  VITE_GOOGLE_CLOUD_PROJECT_NUMBER = "505015578658"

# Canonical : apex + sous-domaines Netlify → www
[[redirects]]
  from = "https://klanvio.com/*"
  to = "https://www.klanvio.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://klanvio1.netlify.app/*"
  to = "https://www.klanvio.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://klanvio.netlify.app/*"
  to = "https://www.klanvio.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/api/*"
  to = ":KLANVIO_API_URL/api/:splat"
  status = 200
  force = true

# SPA : routes connues uniquement → évite soft-404 (URL inventées = vrai 404)
[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/login"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/register"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/mentions"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/confidentialite"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/app"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/app/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/"
  [headers.values]
    X-Robots-Tag = "index, follow, max-image-preview:large"

[[headers]]
  for = "/index.html"
  [headers.values]
    X-Robots-Tag = "index, follow, max-image-preview:large"

[[headers]]
  for = "/404.html"
  [headers.values]
    X-Robots-Tag = "noindex, follow"

[[headers]]
  for = "/login"
  [headers.values]
    X-Robots-Tag = "noindex, follow"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
